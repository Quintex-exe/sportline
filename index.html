<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOOTINT — Global Football Intelligence</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #07140d 0%, #010202 70%);
      font-family: 'Rajdhani', sans-serif;
      color: #d6ffe2;
    }

    canvas {
      display: block;
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.25;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 180px 180px, 260px 260px, 340px 340px;
      background-position: 0 0, 40px 90px, 130px 210px;
    }

    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 320px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: rgba(0,0,0,0.35);
      border-bottom: 1px solid rgba(57,255,106,0.15);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      color: #39ff6a;
      text-shadow: 0 0 15px rgba(57,255,106,0.7);
    }

    .logo span {
      color: #58f4ff;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #9effc7;
      font-size: 13px;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #39ff6a;
      box-shadow: 0 0 10px #39ff6a;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%,100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(0.6);
        opacity: 0.45;
      }
    }

    .clock {
      font-family: 'Orbitron', sans-serif;
      color: #5af5ff;
      font-size: 13px;
      letter-spacing: 2px;
    }

    #sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 320px;
      height: 100vh;
      z-index: 20;
      background: rgba(0,0,0,0.42);
      border-left: 1px solid rgba(57,255,106,0.12);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(57,255,106,0.12);
    }

    .sidebar-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      letter-spacing: 3px;
      color: #39ff6a;
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .feed::-webkit-scrollbar {
      width: 5px;
    }

    .feed::-webkit-scrollbar-thumb {
      background: rgba(57,255,106,0.2);
    }

    .event {
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.03);
      animation: slideIn .4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(18px);
      }
      to {
        opacity: 1;
        transform: translateX(0px);
      }
    }

    .badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .transfer {
      background: rgba(57,255,106,0.12);
      color: #39ff6a;
    }

    .match {
      background: rgba(208,170,255,0.12);
      color: #d0aaff;
    }

    .injury {
      background: rgba(255,107,107,0.12);
      color: #ff6b6b;
    }

    .scout {
      background: rgba(249,199,79,0.12);
      color: #f9c74f;
    }

    .signing {
      background: rgba(90,245,255,0.12);
      color: #5af5ff;
    }

    .route {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .text {
      color: #96b8a1;
      font-size: 14px;
      line-height: 1.5;
    }

    .time {
      margin-top: 8px;
      color: #53735d;
      font-size: 12px;
    }

    #bottom {
      position: fixed;
      left: 0;
      right: 320px;
      bottom: 0;
      height: 48px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid rgba(57,255,106,0.12);
      backdrop-filter: blur(10px);
      color: #6b8872;
      font-size: 12px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .scanline {
      position: fixed;
      left: 0;
      right: 320px;
      height: 2px;
      z-index: 15;
      pointer-events: none;
      background: linear-gradient(to right,
        transparent,
        rgba(57,255,106,0.2),
        rgba(57,255,106,0.5),
        rgba(57,255,106,0.2),
        transparent);
      animation: scan 8s linear infinite;
    }

    @keyframes scan {
      0% {
        top: 58px;
        opacity: 0;
      }
      5% {
        opacity: 1;
      }
      95% {
        opacity: 1;
      }
      100% {
        top: calc(100vh - 48px);
        opacity: 0;
      }
    }

    @media (max-width: 900px) {
      #sidebar {
        width: 100%;
        height: 38vh;
        top: auto;
        bottom: 0;
      }

      #topbar,
      #bottom,
      .scanline {
        right: 0;
      }
    }
  </style>
</head>
<body>

<div class="stars"></div>
<canvas id="bgCanvas"></canvas>
<div class="scanline"></div>

<div id="topbar">
  <div style="display:flex;align-items:center;gap:24px;">
    <div class="logo">FOOT<span>INT</span></div>

    <div class="status">
      <div class="pulse"></div>
      <span>LIVE GLOBAL INTELLIGENCE</span>
    </div>
  </div>

  <div class="clock" id="clock">UTC 00:00:00</div>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">LIVE INTEL FEED</div>
  </div>

  <div class="feed" id="feed"></div>
</div>

<div id="bottom">
  <div class="legend">
    <div class="dot" style="background:#39ff6a;box-shadow:0 0 10px #39ff6a"></div>
    TRANSFERS
  </div>

  <div class="legend">
    <div class="dot" style="background:#5af5ff;box-shadow:0 0 10px #5af5ff"></div>
    SIGNINGS
  </div>

  <div class="legend">
    <div class="dot" style="background:#ff6b6b;box-shadow:0 0 10px #ff6b6b"></div>
    INJURIES
  </div>

  <div class="legend">
    <div class="dot" style="background:#f9c74f;box-shadow:0 0 10px #f9c74f"></div>
    SCOUTING
  </div>

  <div class="legend">
    <div class="dot" style="background:#d0aaff;box-shadow:0 0 10px #d0aaff"></div>
    MATCHES
  </div>
</div>

<script>
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');

  let width;
  let height;
  let centerX;
  let centerY;
  let radius;

  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = width;
    canvas.height = height;

    centerX = (width - 320) / 2;
    centerY = height / 2;
    radius = Math.min(width, height) * 0.28;
  }

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const colors = {
    transfer: '#39ff6a',
    signing: '#5af5ff',
    injury: '#ff6b6b',
    scout: '#f9c74f',
    match: '#d0aaff'
  };

  const points = [
    { city: 'London', x: -0.3, y: -0.25, type: 'transfer' },
    { city: 'Madrid', x: -0.15, y: -0.08, type: 'match' },
    { city: 'Paris', x: -0.05, y: -0.22, type: 'scout' },
    { city: 'Munich', x: 0.05, y: -0.15, type: 'signing' },
    { city: 'Tokyo', x: 0.55, y: -0.08, type: 'scout' },
    { city: 'Rio', x: -0.35, y: 0.32, type: 'transfer' },
    { city: 'Los Angeles', x: -0.68, y: 0.02, type: 'signing' },
    { city: 'Dubai', x: 0.2, y: 0.02, type: 'match' },
    { city: 'Lagos', x: -0.02, y: 0.12, type: 'scout' },
    { city: 'Buenos Aires', x: -0.28, y: 0.58, type: 'injury' }
  ];

  let rotation = 0;

  const arcs = [];

  function projectPoint(point) {
    const angle = rotation + point.x * Math.PI;

    const px = Math.cos(angle) * radius;
    const py = point.y * radius;
    const depth = Math.sin(angle);

    return {
      x: centerX + px,
      y: centerY + py,
      depth
    };
  }

  function drawGlobe() {
    ctx.clearRect(0, 0, width, height);

    rotation += 0.003;

    const glow = ctx.createRadialGradient(centerX, centerY, radius * 0.5, centerX, centerY, radius * 1.3);
    glow.addColorStop(0, 'rgba(57,255,106,0.12)');
    glow.addColorStop(1, 'rgba(57,255,106,0)');

    ctx.beginPath();
    ctx.arc(centerX, centerY, radius * 1.3, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    const globeFill = ctx.createRadialGradient(
      centerX - radius * 0.3,
      centerY - radius * 0.4,
      radius * 0.2,
      centerX,
      centerY,
      radius
    );

    globeFill.addColorStop(0, '#123d2b');
    globeFill.addColorStop(1, '#03110a');

    ctx.beginPath();
    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
    ctx.fillStyle = globeFill;
    ctx.fill();

    ctx.strokeStyle = 'rgba(57,255,106,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#39ff6a';

    for (let i = -4; i <= 4; i++) {
      ctx.beginPath();
      ctx.ellipse(centerX, centerY, radius, radius * Math.cos(i * 0.18), 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    for (let i = 0; i < 10; i++) {
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * (1 - i * 0.08), 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();

    arcs.forEach((arc, index) => {
      const from = projectPoint(arc.from);
      const to = projectPoint(arc.to);

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);

      const cx = (from.x + to.x) / 2;
      const cy = (from.y + to.y) / 2 - 80;

      ctx.quadraticCurveTo(cx, cy, to.x, to.y);

      ctx.strokeStyle = arc.color;
      ctx.globalAlpha = arc.alpha;
      ctx.lineWidth = 1.5;
      ctx.shadowColor = arc.color;
      ctx.shadowBlur = 10;
      ctx.stroke();

      arc.alpha -= 0.003;

      if (arc.alpha <= 0) {
        arcs.splice(index, 1);
      }
    });

    points.forEach(point => {
      const p = projectPoint(point);

      if (p.depth < -0.15) return;

      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = colors[point.type];
      ctx.shadowColor = colors[point.type];
      ctx.shadowBlur = 14;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    });

    requestAnimationFrame(drawGlobe);
  }

  drawGlobe();

  const feed = document.getElementById('feed');

  const templates = {
    transfer: [
      'Premier League side preparing €70m bid.',
      'Release clause activated after late negotiations.',
      'Player representatives arrive for final talks.'
    ],

    signing: [
      'Medical completed successfully. Official announcement soon.',
      'Long-term contract agreed with performance bonuses.',
      'International winger lands ahead of unveiling.'
    ],

    injury: [
      'Star midfielder sidelined for six weeks.',
      'Hamstring issue confirmed after latest scan.',
      'Club doctors monitoring recovery progression.'
    ],

    scout: [
      'Talent scouts tracking emerging academy prospects.',
      'Data analysts monitoring high-potential midfielder.',
      'Club delegation arrives for recruitment discussions.'
    ],

    match: [
      'Continental derby enters final preparations.',
      'Champions League atmosphere intensifies ahead of kickoff.',
      'Security upgraded around major football event.'
    ]
  };

  function spawnEvent() {
    const from = points[Math.floor(Math.random() * points.length)];
    let to = points[Math.floor(Math.random() * points.length)];

    while (to.city === from.city) {
      to = points[Math.floor(Math.random() * points.length)];
    }

    arcs.push({
      from,
      to,
      color: colors[from.type],
      alpha: 0.85
    });

    const message = templates[from.type][Math.floor(Math.random() * templates[from.type].length)];

    const item = document.createElement('div');
    item.className = 'event';

    const now = new Date();

    item.innerHTML = `
      <div class="badge ${from.type}">${from.type.toUpperCase()}</div>
      <div class="route">${from.city} → ${to.city}</div>
      <div class="text">${message}</div>
      <div class="time">${now.toUTCString()}</div>
    `;

    feed.prepend(item);

    while (feed.children.length > 24) {
      feed.removeChild(feed.lastChild);
    }
  }

  for (let i = 0; i < 5; i++) {
    setTimeout(spawnEvent, i * 600);
  }

  setInterval(spawnEvent, 2400);

  function updateClock() {
    const now = new Date();

    const h = String(now.getUTCHours()).padStart(2, '0');
    const m = String(now.getUTCMinutes()).padStart(2, '0');
    const s = String(now.getUTCSeconds()).padStart(2, '0');

    document.getElementById('clock').textContent = `UTC ${h}:${m}:${s}`;
  }

  updateClock();
  setInterval(updateClock, 1000);

  console.log('FOOTINT initialized successfully');
</script>

</body>
</html>
