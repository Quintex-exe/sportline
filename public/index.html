<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOOTINT LIVE</title>

<script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl"></script>
<script src="/socket.io/socket.io.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020403;
overflow:hidden;
font-family:Arial,sans-serif;
color:#d8ffe4;
}

#globeViz{
position:fixed;
inset:0;
z-index:1;
}

#feed{
position:fixed;
right:0;
top:0;
width:360px;
height:100vh;
overflow-y:auto;
padding:16px;
background:rgba(0,0,0,.42);
backdrop-filter:blur(14px);
border-left:1px solid rgba(57,255,106,.14);
z-index:20;
}

.feedItem{
background:rgba(255,255,255,.03);
border:1px solid rgba(57,255,106,.14);
border-radius:18px;
padding:14px;
margin-bottom:14px;
animation:fadeIn .4s ease;
}

.feedType{
display:inline-block;
padding:4px 8px;
border-radius:999px;
background:rgba(57,255,106,.12);
color:#39ff6a;
font-size:11px;
margin-bottom:10px;
font-weight:bold;
}

.feedTitle{
font-size:15px;
font-weight:bold;
line-height:1.4;
margin-bottom:8px;
}

.feedSource{
font-size:12px;
opacity:.7;
}

#logo{
position:fixed;
top:18px;
left:18px;
z-index:30;
font-size:38px;
font-weight:900;
letter-spacing:3px;
color:#39ff6a;
}

#status{
position:fixed;
bottom:20px;
left:20px;
z-index:30;
padding:18px;
border-radius:20px;
background:rgba(0,0,0,.45);
border:1px solid rgba(57,255,106,.16);
min-width:220px;
}

.statRow{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:14px;
}

.statVal{
color:#39ff6a;
font-weight:bold;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<div id="logo">
FOOTINT
</div>

<div id="globeViz"></div>

<div id="feed"></div>

<div id="status">
<div style="font-size:24px;font-weight:bold;color:#39ff6a;">
LIVE INTEL
</div>

<div class="statRow">
<span>Socket</span>
<span class="statVal" id="socketStatus">CONNECTING</span>
</div>

<div class="statRow">
<span>Feed Items</span>
<span class="statVal" id="feedCount">0</span>
</div>

<div class="statRow">
<span>Mode</span>
<span class="statVal">OSINT</span>
</div>
</div>

<script>

const socket = io();

const feed = document.getElementById('feed');
const feedCount = document.getElementById('feedCount');
const socketStatus = document.getElementById('socketStatus');

let totalFeeds = 0;

const world = Globe()
(document.getElementById('globeViz'))

.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
.backgroundColor('#020403')
.showAtmosphere(true)
.atmosphereColor('#39ff6a')
.atmosphereAltitude(0.18);

world.pointOfView({
lat:20,
lng:10,
alt:2.2
});

const arcs = [];

world
.arcsData(arcs)
.arcColor(()=>'#39ff6a')
.arcDashLength(0.3)
.arcDashGap(0.02)
.arcDashAnimateTime(2000)
.arcStroke(0.8);

function addArc(){

const startLat = (Math.random()*180)-90;
const startLng = (Math.random()*360)-180;

const endLat = (Math.random()*180)-90;
const endLng = (Math.random()*360)-180;

arcs.push({
startLat,
startLng,
endLat,
endLng
});

if(arcs.length > 40){
arcs.shift();
}

world.arcsData([...arcs]);

}

setInterval(addArc,1200);

socket.on('connect', ()=>{

socketStatus.innerText = 'LIVE';

});

socket.on('intel-event', event => {

totalFeeds++;

feedCount.innerText = totalFeeds;

const item = document.createElement('div');

item.className = 'feedItem';

item.innerHTML = `
<div class="feedType">${event.type || 'EVENT'}</div>
<div class="feedTitle">${event.title}</div>
<div class="feedSource">${event.source}</div>
`;

feed.prepend(item);

if(feed.children.length > 80){
feed.removeChild(feed.lastChild);
}

addArc();

});

</script>

</body>
</html>
