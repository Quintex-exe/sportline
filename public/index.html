<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOOTINT LIVE</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020403;
overflow:hidden;
font-family:Arial,sans-serif;
color:#d8ffe4;
}

/* BACKGROUND */

#background{
position:fixed;
inset:0;
z-index:1;
overflow:hidden;
background:
radial-gradient(circle at center,
rgba(57,255,106,.18),
transparent 60%),
#020403;
}

/* GRID */

#grid{
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(57,255,106,.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(57,255,106,.04) 1px, transparent 1px);
background-size:40px 40px;
}

/* BIG WATERMARK */

#bgLogo{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:140px;
font-weight:900;
letter-spacing:16px;
color:#39ff6a;
opacity:.12;
user-select:none;
}

/* MAIN LOGO */

#logo{
position:fixed;
top:18px;
left:18px;
z-index:30;
font-size:38px;
font-weight:900;
letter-spacing:3px;
color:#39ff6a;
text-shadow:0 0 20px #39ff6a;
}

/* FEED */

#feed{
position:fixed;
right:0;
top:0;
width:360px;
height:100vh;
overflow-y:auto;
padding:16px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(14px);
border-left:1px solid rgba(57,255,106,.12);
z-index:20;
}

.feedItem{
background:rgba(255,255,255,.03);
border:1px solid rgba(57,255,106,.14);
border-radius:18px;
padding:14px;
margin-bottom:14px;
animation:fadeIn .4s ease;
box-shadow:0 0 12px rgba(57,255,106,.08);
}

.feedType{
display:inline-block;
padding:4px 8px;
border-radius:999px;
background:rgba(57,255,106,.12);
color:#39ff6a;
font-size:11px;
margin-bottom:10px;
font-weight:bold;
}

.feedTitle{
font-size:15px;
font-weight:bold;
line-height:1.4;
margin-bottom:8px;
}

.feedSource{
font-size:12px;
opacity:.7;
}

/* STATUS */

#status{
position:fixed;
bottom:20px;
left:20px;
z-index:30;
padding:18px;
border-radius:20px;
background:rgba(0,0,0,.45);
border:1px solid rgba(57,255,106,.16);
min-width:220px;
box-shadow:0 0 20px rgba(57,255,106,.08);
}

.statRow{
display:flex;
justify-content:space-between;
margin-top:12px;
font-size:14px;
}

.statVal{
color:#39ff6a;
font-weight:bold;
}

/* FLOATING DOTS */

.dot{
position:absolute;
width:5px;
height:5px;
border-radius:50%;
background:#39ff6a;
box-shadow:0 0 18px #39ff6a;
opacity:.9;
}

/* ANIMATIONS */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<div id="background">

<div id="grid"></div>

<div id="bgLogo">
FOOTINT
</div>

</div>

<div id="logo">
FOOTINT
</div>

<div id="feed"></div>

<div id="status">

<div style="
font-size:24px;
font-weight:bold;
color:#39ff6a;
">
LIVE INTEL
</div>

<div class="statRow">
<span>Socket</span>
<span class="statVal" id="socketStatus">
CONNECTING
</span>
</div>

<div class="statRow">
<span>Feed Items</span>
<span class="statVal" id="feedCount">
0
</span>
</div>

<div class="statRow">
<span>Mode</span>
<span class="statVal">
OSINT
</span>
</div>

</div>

<script>

const socket = io();

const feed = document.getElementById('feed');
const feedCount = document.getElementById('feedCount');
const socketStatus = document.getElementById('socketStatus');

let totalFeeds = 0;

/* FLOATING INTEL DOTS */

const dots = [];

for(let i=0;i<80;i++){

const dot = document.createElement('div');

dot.className = 'dot';

document.body.appendChild(dot);

dots.push({
el:dot,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
vx:(Math.random()-.5)*0.4,
vy:(Math.random()-.5)*0.4
});

}

function animateDots(){

for(const d of dots){

d.x += d.vx;
d.y += d.vy;

if(d.x < 0 || d.x > window.innerWidth){
d.vx *= -1;
}

if(d.y < 0 || d.y > window.innerHeight){
d.vy *= -1;
}

d.el.style.left = d.x + 'px';
d.el.style.top = d.y + 'px';

}

requestAnimationFrame(animateDots);

}

animateDots();

/* SOCKET */

socket.on('connect', ()=>{

socketStatus.innerText = 'LIVE';

});

/* LIVE FEED */

socket.on('intel-event', event => {

totalFeeds++;

feedCount.innerText = totalFeeds;

const item = document.createElement('div');

item.className = 'feedItem';

item.innerHTML = `
<div class="feedType">
${event.type || 'EVENT'}
</div>

<div class="feedTitle">
${event.title}
</div>

<div class="feedSource">
${event.source}
</div>
`;

feed.prepend(item);

if(feed.children.length > 80){
feed.removeChild(feed.lastChild);
}

flashIntel();

});

/* FLASH EFFECT */

function flashIntel(){

const flash = document.createElement('div');

Object.assign(flash.style,{
position:'fixed',
inset:'0',
background:'radial-gradient(circle,#39ff6a22 0%,transparent 70%)',
pointerEvents:'none',
opacity:'1',
transition:'opacity .6s ease',
zIndex:'5'
});

document.body.appendChild(flash);

requestAnimationFrame(()=>{
flash.style.opacity='0';
});

setTimeout(()=>{
flash.remove();
},600);

}

</script>

</body>
</html>
