```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOOTINT LIVE</title>

<script src="/socket.io/socket.io.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#03110a;
overflow:hidden;
font-family:Arial,sans-serif;
color:#d8ffe4;
}

/* MAIN BACKGROUND */

#background{
position:fixed;
inset:0;
z-index:1;
background:
radial-gradient(circle at center,
rgba(57,255,106,.25),
transparent 65%),
linear-gradient(to bottom,#03110a,#010302);
}

/* VISIBLE GRID */

#grid{
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(57,255,106,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(57,255,106,.08) 1px, transparent 1px);
background-size:50px 50px;
opacity:.8;
}

/* WATERMARK */

#bgLogo{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:180px;
font-weight:900;
letter-spacing:18px;
color:#39ff6a;
opacity:.15;
user-select:none;
text-shadow:0 0 40px #39ff6a;
}

/* MAIN LOGO */

#logo{
position:fixed;
top:18px;
left:18px;
z-index:50;
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#39ff6a;
text-shadow:0 0 20px #39ff6a;
}

/* LIVE FEED */

#feed{
position:fixed;
right:0;
top:0;
width:370px;
height:100vh;
overflow-y:auto;
padding:16px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
border-left:1px solid rgba(57,255,106,.25);
z-index:40;
}

/* FEED CARDS */

.feedItem{
background:rgba(0,255,120,.04);
border:1px solid rgba(57,255,106,.22);
border-radius:18px;
padding:14px;
margin-bottom:14px;
animation:fadeIn .35s ease;
box-shadow:0 0 20px rgba(57,255,106,.08);
}

.feedType{
display:inline-block;
padding:4px 10px;
border-radius:999px;
background:rgba(57,255,106,.14);
color:#39ff6a;
font-size:11px;
font-weight:bold;
margin-bottom:10px;
}

.feedTitle{
font-size:15px;
font-weight:bold;
line-height:1.45;
margin-bottom:8px;
}

.feedSource{
font-size:12px;
opacity:.7;
}

/* STATUS PANEL */

#status{
position:fixed;
bottom:20px;
left:20px;
z-index:50;
padding:18px;
border-radius:18px;
background:rgba(0,0,0,.5);
border:1px solid rgba(57,255,106,.2);
min-width:240px;
box-shadow:0 0 20px rgba(57,255,106,.08);
}

.statTitle{
font-size:24px;
font-weight:bold;
color:#39ff6a;
margin-bottom:10px;
}

.statRow{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

.statVal{
color:#39ff6a;
font-weight:bold;
}

/* FLOATING NODES */

.node{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
background:#39ff6a;
box-shadow:
0 0 10px #39ff6a,
0 0 20px #39ff6a;
opacity:1;
z-index:2;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(12px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<div id="background">

<div id="grid"></div>

<div id="bgLogo">
FOOTINT
</div>

</div>

<div id="logo">
FOOTINT
</div>

<div id="feed"></div>

<div id="status">

<div class="statTitle">
LIVE INTEL
</div>

<div class="statRow">
<span>Socket</span>
<span class="statVal" id="socketStatus">
CONNECTING
</span>
</div>

<div class="statRow">
<span>Feed Items</span>
<span class="statVal" id="feedCount">
0
</span>
</div>

<div class="statRow">
<span>Mode</span>
<span class="statVal">
OSINT
</span>
</div>

</div>

<script>

/* ---------- SOCKET ---------- */

const socket = io();

/* ---------- DOM ---------- */

const feed = document.getElementById('feed');
const feedCount = document.getElementById('feedCount');
const socketStatus = document.getElementById('socketStatus');

/* ---------- STARTER CONTENT ---------- */

feed.innerHTML = `
<div class="feedItem">
<div class="feedType">SYSTEM</div>
<div class="feedTitle">
FOOTINT realtime OSINT feed initialized successfully.
</div>
<div class="feedSource">
local node backend
</div>
</div>
`;

/* ---------- FLOATING NODES ---------- */

const nodes = [];

for(let i=0;i<120;i++){

const node = document.createElement('div');

node.className = 'node';

document.body.appendChild(node);

nodes.push({
el:node,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
vx:(Math.random()-.5)*0.6,
vy:(Math.random()-.5)*0.6
});

}

function animateNodes(){

for(const n of nodes){

n.x += n.vx;
n.y += n.vy;

if(n.x <= 0 || n.x >= window.innerWidth){
n.vx *= -1;
}

if(n.y <= 0 || n.y >= window.innerHeight){
n.vy *= -1;
}

n.el.style.left = n.x + 'px';
n.el.style.top = n.y + 'px';

}

requestAnimationFrame(animateNodes);

}

animateNodes();

/* ---------- LIVE COUNTER ---------- */

let totalFeeds = 1;

/* ---------- SOCKET CONNECT ---------- */

socket.on('connect', ()=>{

socketStatus.innerText = 'LIVE';

});

/* ---------- FEED EVENTS ---------- */

socket.on('intel-event', event => {

totalFeeds++;

feedCount.innerText = totalFeeds;

const item = document.createElement('div');

item.className = 'feedItem';

item.innerHTML = `
<div class="feedType">
${event.type || 'EVENT'}
</div>

<div class="feedTitle">
${event.title}
</div>

<div class="feedSource">
${event.source}
</div>
`;

feed.prepend(item);

if(feed.children.length > 70){
feed.removeChild(feed.lastChild);
}

pulse();

});

/* ---------- SCREEN PULSE ---------- */

function pulse(){

const pulse = document.createElement('div');

Object.assign(pulse.style,{
position:'fixed',
inset:'0',
background:'radial-gradient(circle, rgba(57,255,106,.12), transparent 70%)',
pointerEvents:'none',
opacity:'1',
transition:'opacity .6s ease',
zIndex:'10'
});

document.body.appendChild(pulse);

requestAnimationFrame(()=>{
pulse.style.opacity='0';
});

setTimeout(()=>{
pulse.remove();
},600);

}

</script>

</body>
</html>
```
